<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            transition: background-color 0.5s ease; 
        }

        /* Стиль стартовой кнопки */
        .btn-start {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            background-color: #000000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s, transform 0.1s, opacity 0.3s;
            z-index: 2; /* Чтобы кнопка была поверх всего изначально */
        }

        .btn-start:hover {
            background-color: #222222;
        }

        .btn-start:active {
            transform: scale(0.98);
        }

        /* Стиль хакерского текста */
        .terminal-text {
            display: none;
            font-family: 'Courier New', Courier, monospace; 
            color: #00ff00; 
            font-size: 20px;
            text-align: center;
            line-height: 1.6;
            white-space: pre-line; 
            z-index: 2;
        }

        body.hacked {
            background-color: #000000; 
        }

        /* Контейнер для скрытого видео (на весь экран) */
        .video-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            z-index: 9999; /* Поверх всех элементов сайта */
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Видео растянется красиво без искажений */
        }
    </style>
</head>
<body>

    <!-- Стартовая кнопка -->
    <button class="btn-start" id="startBtn" onclick="startHacking()">Начать взлом</button>
    
    <!-- Текст терминала -->
    <div class="terminal-text" id="terminalText"></div>

    <!-- Видеоплеер (скрыт до 100%) -->
    <div class="video-container" id="videoContainer">
        <video id="hackVideo" src="aura.mp4"></video>
    </div>

    <script>
        function startHacking() {
            const button = document.getElementById('startBtn');
            const terminal = document.getElementById('terminalText');
            const videoContainer = document.getElementById('videoContainer');
            const video = document.getElementById('hackVideo');
            
            // Исчезновение кнопки
            button.style.opacity = '0';
            setTimeout(() => {
                button.style.display = 'none';
            }, 300);

            // Включаем черный фон
            document.body.classList.add('hacked');

            // Появление хакерского текста через 0.5 сек
            setTimeout(() => {
                terminal.style.display = 'block';
                
                const baseText = `[INITIALIZING OVERRIDE PROTOCOL...]\nEstablishing secure proxy tunnel...\nBypassing mainframe firewall [SUCCESS]\n`;
                terminal.innerHTML = baseText;

                let progress = 0;

                function updateProgress() {
                    if (progress < 100) {
                        // Рандомный шаг процентов
                        let step = Math.floor(Math.random() * 14) + 2; 
                        progress += step;

                        if (progress > 100) progress = 100;

                        terminal.innerHTML = baseText + `\nInjecting payload: ${progress}%...`;

                        // Рандомная задержка (эффект зависания)
                        let nextDelay = Math.floor(Math.random() * 650) + 150;
                        if (progress > 40 && progress < 55) nextDelay += 400;
                        if (progress > 80 && progress < 88) nextDelay += 600;

                        setTimeout(updateProgress, nextDelay);
                    } else {
                        // 100% достигнуто! Скрываем текст и врубаем видео
                        terminal.style.display = 'none';
                        videoContainer.style.display = 'block';
                        
                        // Запускаем видео и включаем звук
                        video.play();
                    }
                }

                updateProgress();

            }, 500);
        }
    </script>

</body>
</html>
